version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: saturday-smashers-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-saturday_smashers}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saturday-smashers-backend-dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-saturday_smashers}
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: saturday-smashers-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    develop:
      watch:
        - path: ./src
          action: sync
          target: /app/src
        - path: ./public
          action: sync
          target: /app/public

volumes:
  pgdata_dev:
