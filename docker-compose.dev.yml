  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saturday-smashers-backend-dev
    restart: unless-stopped
    environment:
      # Use host.docker.internal to reach your Windows Postgres
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@host.docker.internal:5432/${DB_NAME:-saturday_smashers}
      DEBUG: "True"
      SQL_ECHO: "False"
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # Add mapping to reach host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: saturday-smashers-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    develop:
      watch:
        - path: ./src
          action: sync
          target: /app/src
        - path: ./public
          action: sync
          target: /app/public

volumes:
  pgdata_dev:
